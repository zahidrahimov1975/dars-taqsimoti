name: Build Windows EXE

# Runs automatically on every upload to the repo, and can also be
# started by hand from the Actions tab (the "Run workflow" button).
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest          # a free Microsoft-hosted Windows machine
    steps:
      - name: Get the code
        uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install the build tool
        run: pip install pyinstaller

      - name: Build the .exe
        run: pyinstaller --onefile --windowed --name DarsTaqsimoti app.py

      # No database is shipped on purpose — the app creates an empty
      # dars_taqsimoti.db next to the .exe the first time it runs.
      - name: Publish the result for download
        uses: actions/upload-artifact@v6
        with:
          name: DarsTaqsimoti-windows
          path: dist
